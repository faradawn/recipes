guide: |
  ## Overview

  [Qwen3.6-35B-A3B-2.0GB-per-token-CT](https://huggingface.co/nvidia/Qwen3.6-35B-A3B-2.0GB-per-token-CT)
  is NVIDIA's compressed-tensors NVFP4 quantization of
  [Qwen/Qwen3.6-35B-A3B](https://huggingface.co/Qwen/Qwen3.6-35B-A3B), tuned to
  hit roughly 2 GB of KV cache per 1M tokens on Blackwell with FP8 KV cache and
  the FlashInfer-TRTLLM NVFP4 GEMM backend. The 35B MoE (3B active per token) fits
  on a single B200 / B300 / GB300 / DGX Station GPU.

  ## Prerequisites

  - **Hardware:** 1× B200 / B300 / GB300 NVL4 tray, or DGX Station (GB300, 288 GB)
  - **vLLM:** >= 0.17.0 with the FlashInfer-TRTLLM NVFP4 GEMM backend available
  - **Docker:** NVIDIA Container Toolkit recommended

  ## DGX Station (GB300) — single-GPU launch

  This is the reference command for a single GB300 Grace-Blackwell Ultra
  superchip with 288 GB HBM3e:

  ```bash
  VLLM_NVFP4_GEMM_BACKEND=flashinfer-trtllm \
  vllm serve nvidia/Qwen3.6-35B-A3B-2.0GB-per-token-CT \
    --served-model-name qwen35b \
    --port 8000 \
    --tensor-parallel-size 1 \
    --max-model-len 40960 \
    --max-num-seqs 4 --max-num-batched-tokens 40960 \
    --gpu-memory-utilization 0.85 \
    --kv-cache-dtype fp8 --attention-backend flashinfer \
    --dtype auto --trust-remote-code \
    --enable-chunked-prefill --async-scheduling \
    --enable-flashinfer-autotune \
    --moe-backend=marlin --quantization=compressed-tensors \
    --enable-prefix-caching \
    --speculative-config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
  ```

  Key flags:

  - `--quantization=compressed-tensors` matches the checkpoint format
  - `--moe-backend=marlin` runs the quantized experts on Marlin kernels
  - `VLLM_NVFP4_GEMM_BACKEND=flashinfer-trtllm` selects the TRTLLM NVFP4 GEMM
  - `--kv-cache-dtype fp8` keeps KV cache near 2 GB/1M-token
  - MTP `moe_backend: triton` keeps the draft path off Marlin

